<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>claude4spec</title>
    <script>
      // M26 §7 anti-FOUC — apply the `.dark` class synchronously before React
      // mounts. Mirrors the resolution in `useTheme()`: `system` follows
      // prefers-color-scheme, explicit `light` / `dark` overrides it. Reads
      // the same envelope key as the React hook so the two stay in sync.
      try {
        var raw = localStorage.getItem('c4s:settings:theme');
        var theme = raw ? JSON.parse(raw).data : 'system';
        var dark =
          theme === 'dark' ||
          (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      } catch (_) {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
